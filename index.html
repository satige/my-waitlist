<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>skillex Gaming — Waitlist</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple: #a855f7;
      --blue: #3b82f6;
      --bg: #07080f;
      --card: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --text: #e8e8f0;
      --muted: #6b6b80;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    /* Ambient blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--purple);
      top: -150px; left: -150px;
    }
    body::after {
      width: 500px; height: 500px;
      background: var(--blue);
      bottom: -150px; right: -150px;
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s ease both;
    }
    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(2.8rem, 8vw, 4rem);
      letter-spacing: -0.02em;
      line-height: 1;
      text-transform: uppercase;
    }
    .logo span {
      background: linear-gradient(135deg, var(--purple), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      margin-top: 0.6rem;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── Counters ── */
    .counters {
      display: flex;
      justify-content: center;
      gap: 3rem;
      margin-bottom: 2.5rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }
    .counter-item { text-align: center; }
    .counter-num {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 2.6rem;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .counter-num.purple { color: var(--purple); }
    .counter-num.blue   { color: var(--blue); }
    .counter-num.loading {
      opacity: 0.4;
      animation: pulse 1.5s ease infinite;
    }
    .counter-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-top: 0.3rem;
      font-weight: 500;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      backdrop-filter: blur(20px);
      animation: fadeUp 0.6s 0.2s ease both;
    }

    /* ── Role Toggle ── */
    .role-label {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
      display: block;
    }
    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .role-option input[type="radio"] { display: none; }
    .role-option label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 1.1rem 0.5rem;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      font-size: 0.9rem;
      font-weight: 500;
    }
    .role-option label .icon { font-size: 1.6rem; }
    .role-option input:checked + label {
      border-color: var(--purple);
      background: rgba(168, 85, 247, 0.08);
    }
    .role-option.company input:checked + label {
      border-color: var(--blue);
      background: rgba(59, 130, 246, 0.08);
    }
    .role-option label:hover { border-color: rgba(255,255,255,0.2); }

    /* ── Fields ── */
    .field { margin-bottom: 1.25rem; }
    .field.hidden { display: none; }
    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }
    .field input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(0,0,0,0.35);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input::placeholder { color: #3d3d50; }
    .field input:focus { border-color: var(--purple); }
    .field.email input:focus { border-color: var(--blue); }

    /* ── Submit ── */
    .submit-btn {
      width: 100%;
      padding: 0.95rem;
      margin-top: 0.5rem;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--purple), var(--blue));
      color: #fff;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .submit-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .submit-btn:active:not(:disabled) { transform: translateY(0); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Success ── */
    .success {
      display: none;
      text-align: center;
      padding: 1.5rem 0;
      animation: fadeUp 0.5s ease both;
    }
    .success.show { display: block; }
    .success .emoji { font-size: 3rem; margin-bottom: 1rem; display: block; }
    .success h3 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
    }
    .success p { color: var(--muted); font-size: 0.95rem; }

    /* ── Error banner ── */
    .error-banner {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: #f87171;
      margin-top: 0.75rem;
      text-align: center;
    }
    .error-banner.show { display: block; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 0.8; }
    }
    .bump {
      animation: bump 0.4s ease;
    }
    @keyframes bump {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.15); color: #4ade80; }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="logo">skillex <span>Gaming</span></div>
    <p class="tagline">where gamers get hired.</p>
  </div>

  <!-- Counters -->
  <div class="counters">
    <div class="counter-item">
      <div id="gamer-count" class="counter-num purple loading">--</div>
      <div class="counter-label">Gamers Ready</div>
    </div>
    <div class="counter-item">
      <div id="company-count" class="counter-num blue loading">--</div>
      <div class="counter-label">Companies Onboard</div>
    </div>
  </div>

  <!-- Card -->
  <div class="card">

    <!-- Form -->
    <form id="waitlist-form">

      <span class="role-label">I am joining as a:</span>
      <div class="role-grid">
        <div class="role-option gamer">
          <input type="radio" name="role" id="role-gamer" value="gamer" checked>
          <label for="role-gamer">
            <span class="icon">🎮</span> Gamer
          </label>
        </div>
        <div class="role-option company">
          <input type="radio" name="role" id="role-company" value="company">
          <label for="role-company">
            <span class="icon">🏢</span> Company
          </label>
        </div>
      </div>

      <div class="field" id="field-game">
        <label for="game">Main Game <span style="color:var(--muted);font-size:0.75em;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="text" id="game" name="game" placeholder="e.g. Valorant" autocomplete="off">
      </div>

      <div class="field hidden" id="field-industry">
        <label for="industry">Industry <span style="color:var(--muted);font-size:0.75em;text-transform:none;letter-spacing:0">(optional)</span></label>
        <input type="text" id="industry" name="industry" placeholder="e.g. Esports Hardware" autocomplete="off">
      </div>

      <div class="field email">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">Secure Your Spot →</button>
      <div class="error-banner" id="error-banner">Something went wrong — please try again.</div>
    </form>

    <!-- Success -->
    <div class="success" id="success-msg">
      <span class="emoji">🎉</span>
      <h3>You're on the list!</h3>
      <p>Keep an eye on your inbox. We'll be in touch soon.</p>
    </div>

  </div>
</div>

<script>
  // ─────────────────────────────────────────────
  // ⚙️  CONFIG — trage deine URLs hier ein
  // ─────────────────────────────────────────────
  const WRITE_URL = "DEINE_APPS_SCRIPT_URL_HIER";   // z.B. https://script.google.com/macros/s/.../exec
  const READ_URL  = "/.netlify/functions/getcount"; // Netlify Function URL
  // ─────────────────────────────────────────────

  const gamerEl   = document.getElementById("gamer-count");
  const companyEl = document.getElementById("company-count");
  const form      = document.getElementById("waitlist-form");
  const submitBtn = document.getElementById("submit-btn");
  const errorBanner = document.getElementById("error-banner");

  // ── Load counters ──────────────────────────────
  async function loadCounts() {
    // Show cached instantly
    try {
      const cached = JSON.parse(localStorage.getItem("skillex-counts") || "null");
      if (cached) setCounters(cached.gamers, cached.companies, false);
    } catch (_) {}

    try {
      const res  = await fetch(`${READ_URL}?t=${Date.now()}`, { cache: "no-store" });
      const data = await res.json();
      setCounters(data.gamers || 0, data.companies || 0, true);
      localStorage.setItem("skillex-counts", JSON.stringify({
        gamers:    data.gamers    || 0,
        companies: data.companies || 0,
      }));
    } catch (err) {
      console.warn("Could not load counts:", err);
      gamerEl.classList.remove("loading");
      companyEl.classList.remove("loading");
      gamerEl.textContent   = "?";
      companyEl.textContent = "?";
    }
  }

  function setCounters(gamers, companies, animated) {
    gamerEl.classList.remove("loading");
    companyEl.classList.remove("loading");
    gamerEl.textContent   = gamers;
    companyEl.textContent = companies;
    if (animated) {
      gamerEl.classList.add("bump");
      companyEl.classList.add("bump");
      setTimeout(() => {
        gamerEl.classList.remove("bump");
        companyEl.classList.remove("bump");
      }, 400);
    }
  }

  loadCounts();

  // ── Role toggle ────────────────────────────────
  const gameWrap     = document.getElementById("field-game");
  const industryWrap = document.getElementById("field-industry");
  const gameInput    = document.getElementById("game");
  const industryInput = document.getElementById("industry");

  function updateRole() {
    const role = form.querySelector('input[name="role"]:checked').value;
    if (role === "gamer") {
      gameWrap.classList.remove("hidden");
      industryWrap.classList.add("hidden");
      gameInput.required     = false;
      industryInput.required = false;
      industryInput.value    = "";
    } else {
      industryWrap.classList.remove("hidden");
      gameWrap.classList.add("hidden");
      industryInput.required = false;
      gameInput.required     = false;
      gameInput.value        = "";
    }
  }

  updateRole();
  form.querySelectorAll('input[name="role"]').forEach(r => r.addEventListener("change", updateRole));

  // ── Submit ─────────────────────────────────────
  form.addEventListener("submit", async function(e) {
    e.preventDefault();
    errorBanner.classList.remove("show");

    const role     = form.querySelector('input[name="role"]:checked').value;
    const email    = document.getElementById("email").value.trim();
    const game     = role === "gamer"   ? gameInput.value.trim()     : "";
    const industry = role === "company" ? industryInput.value.trim() : "";

    if (!email) return;

    submitBtn.disabled    = true;
    submitBtn.textContent = "Securing…";

    // GET mit URL-Parametern — zuverlässigste Methode für Apps Script (kein CORS-Preflight)
    const params = new URLSearchParams({ role, email, game, industry, action: "write" });

    try {
      await fetch(`${WRITE_URL}?${params.toString()}`, { method: "GET", mode: "no-cors" });

      // Optimistically show success & bump counter
      form.style.display = "none";
      document.getElementById("success-msg").classList.add("show");

      const el = role === "gamer" ? gamerEl : companyEl;
      const n  = parseInt(el.textContent, 10);
      if (!isNaN(n)) {
        el.textContent = n + 1;
        el.classList.add("bump");
        setTimeout(() => el.classList.remove("bump"), 400);
        try {
          localStorage.setItem("skillex-counts", JSON.stringify({
            gamers:    parseInt(gamerEl.textContent, 10)   || 0,
            companies: parseInt(companyEl.textContent, 10) || 0,
          }));
        } catch (_) {}
      }
    } catch (err) {
      console.error(err);
      errorBanner.classList.add("show");
      submitBtn.disabled    = false;
      submitBtn.textContent = "Secure Your Spot →";
    }
  });
</script>
</body>
</html>
